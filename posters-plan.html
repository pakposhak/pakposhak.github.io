<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="google" content="notranslate"/>
<title>PakPoshak — Hero Posters</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#ECE6D8;color:#1A1208;padding-bottom:80px}
.top{position:sticky;top:0;z-index:30;background:#0B261C;color:#F4ECD6;padding:9px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(0,0,0,.25)}
.top h1{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#EDE7D2}
.nav{display:flex;align-items:center;gap:7px}
.nav button{width:36px;height:36px;border-radius:9px;border:1.5px solid #4A6B54;background:#123021;color:#EDE7D2;font-size:18px;cursor:pointer;line-height:1}
.nav button:hover{background:#1A4030}
.counter{font-size:12.5px;color:#CFC094;min-width:96px;text-align:center;line-height:1.25}
.counter b{color:#E7CE97}
.spacer{flex:1}
.jump{background:#123021;color:#EDE7D2;border:1.5px solid #4A6B54;border-radius:9px;padding:8px 10px;font-size:12.5px;font-family:inherit;cursor:pointer;max-width:190px}
.seg{display:flex;border:1.5px solid #4A6B54;border-radius:9px;overflow:hidden}
.seg button{background:#0B261C;color:#AFC0A8;border:none;padding:8px 13px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
.seg button.on{background:#E7CE97;color:#17130A}
.btn-copy{background:#C9A96E;color:#1A1208;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-copy:hover{opacity:.9}

.wrap{max-width:1080px;margin:0 auto;padding:14px 14px 0;display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap}
.leftcol{flex:1 1 440px;min-width:300px;max-width:520px}
.rightcol{flex:1 1 360px;min-width:300px}

/* ── Big hero preview ── */
.pageband{display:flex;align-items:center;gap:10px;margin:0 2px 10px}
.pageband .emoji{font-size:22px}
.pageband .pt{font-family:Georgia,serif;font-size:16px;font-weight:700;color:#0B261C}
.pageband .rt{font-size:11px;font-family:ui-monospace,Consolas,monospace;background:#E1D7BF;color:#4A3F22;border-radius:5px;padding:2px 8px}
.pageband .pd{font-size:11.5px;color:#6B5A3E}

.hero{position:relative;width:100%;aspect-ratio:2.1/1;border-radius:14px;overflow:hidden;background:linear-gradient(135deg,#0b3a22,#0a5230);box-shadow:0 8px 26px -10px rgba(0,0,0,.45);container-type:inline-size}
.hero-img{position:absolute;inset:0;background-size:cover;background-position:center 22%}
.hero-ov{position:absolute;inset:0;background:linear-gradient(90deg,rgba(4,18,10,.86) 0%,rgba(4,18,10,.56) 44%,rgba(4,18,10,.12) 100%)}
.hero-tx{position:absolute;left:0;top:0;bottom:0;display:flex;flex-direction:column;justify-content:center;padding:0 6% ;max-width:80%}
.hero-t{color:#fff;font-size:6cqw;font-weight:800;line-height:1.14;letter-spacing:.2px;text-shadow:0 2px 10px rgba(0,0,0,.55)}
.hero-s{color:#F1E8CF;font-size:2.9cqw;font-weight:600;line-height:1.38;margin-top:1.6cqw;text-shadow:0 1px 6px rgba(0,0,0,.55);max-width:92%}
.hero-badge{position:absolute;top:12px;left:14px;z-index:3;background:rgba(0,0,0,.5);color:#F4ECD6;font-size:11.5px;font-weight:700;border-radius:20px;padding:4px 12px;backdrop-filter:blur(4px)}
.hero-dots{position:absolute;bottom:12px;right:16px;display:flex;gap:6px;z-index:3}
.hdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.45)}
.hdot.on{background:#E7CE97;width:22px;border-radius:5px}

.posnav{display:flex;align-items:center;justify-content:center;gap:14px;margin:9px 0 0}
.posnav .arr{width:40px;height:40px;border-radius:10px;border:1.5px solid #C4AE80;background:#fff;color:#0B261C;font-size:20px;cursor:pointer}
.posnav .arr:hover{background:#F5EEDD}
.posnav .lab{font-size:13px;color:#6B5A3E;min-width:150px;text-align:center}

/* ── Editable panel ── */
.panel{background:#FBF7EE;border:1.5px solid #E3D9C0;border-radius:14px;padding:14px}
.prow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #EBE1CB}
.prow .grp{display:flex;align-items:center;gap:6px}
.prow label{font-size:11px;font-weight:700;color:#5F5238;text-transform:uppercase;letter-spacing:.04em}
.prow select{background:#fff;border:1.5px solid #D8CCAE;border-radius:8px;padding:7px 9px;font-size:12.5px;font-family:inherit;color:#1A1208;cursor:pointer}
.ord{display:flex;gap:5px}
.ord button{width:34px;height:34px;border:1.5px solid #D8CCAE;background:#fff;border-radius:8px;font-size:14px;cursor:pointer;color:#0B261C}
.ord button:disabled{opacity:.3;cursor:default}
.ord button:not(:disabled):hover{background:#F5EEDD}

.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.f2{grid-template-columns:1fr}}
.fg{margin-bottom:9px;display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10.5px;font-weight:700;color:#5F5238;text-transform:uppercase;letter-spacing:.04em}
.fg textarea{width:100%;background:#fff;border:1.5px solid #D8CCAE;border-radius:9px;color:#1A1208;font-family:inherit;font-size:13px;padding:7px 10px;line-height:1.35;resize:vertical;min-height:36px}
.fg textarea:focus{outline:none;border-color:#A8842B;background:#fffdf7}
.fg textarea.bn{font-size:14px}
.fg textarea.remarks{background:#FFFCE6;border-color:#E8D888;font-style:italic;color:#5F5238}
.fg textarea.remarks.has{border-color:#C9A96E;background:#FFFCE6}
.actions{display:flex;gap:9px;margin-top:6px;flex-wrap:wrap}
.actions button{font-family:inherit;font-size:12.5px;font-weight:700;border-radius:9px;padding:9px 14px;cursor:pointer;border:1.5px solid transparent}
.b-add{background:#0A5230;color:#F4ECD6}
.b-add:hover{background:#0C6038}
.b-del{background:#FDECEA;border-color:#F5BEBA;color:#B71C1C}
.b-del:hover{background:#FADADD}

/* Output + bottom bar */
.out-wrap{max-width:860px;margin:16px auto 0;padding:0 14px}
.out-wrap textarea{width:100%;height:150px;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;padding:11px;border:1px solid #D8CCAE;border-radius:11px;background:#FBF8F1;color:#1A1208;line-height:1.5;resize:vertical}
.out-note{font-size:11.5px;color:#6B5A3E;margin-top:7px;line-height:1.55}
.out-note code{background:#E8DFC9;border-radius:4px;padding:1px 5px}
.bar{position:fixed;left:0;right:0;bottom:0;background:#0B261C;color:#F4ECD6;padding:9px 14px;display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap;box-shadow:0 -4px 16px rgba(0,0,0,.3);z-index:20}
.bar .info{font-size:12px;color:#8AB09A}
.bar button{font-family:inherit;font-size:13.5px;font-weight:700;border:none;border-radius:9px;padding:9px 20px;cursor:pointer}
.bar .cp{background:#C9A96E;color:#1A1208}
.bar .rs{background:transparent;color:#C9A96E;border:1.5px solid #6E5B33}
.share-btn{background:#2A6E48;color:#EDF6EE;border:none;border-radius:9px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.share-btn:hover{background:#33845A}
.filters{max-width:860px;margin:0 auto;padding:14px 14px 0;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.filters .flab{font-size:11px;font-weight:700;color:#5F5238;text-transform:uppercase;letter-spacing:.04em}
.filters .fbtn{background:#F3ECDB;border:1.5px solid #D8CCAE;border-radius:20px;padding:7px 14px;font-size:12.5px;font-weight:700;color:#5F5238;cursor:pointer;font-family:inherit}
.filters .fbtn.on{background:#0B261C;color:#E7CE97;border-color:#0B261C}
.filters .fbtn b{font-weight:800}
.chips{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:10px}
.chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid #D8CCAE;border-radius:20px;padding:9px 15px;font-size:12.5px;font-weight:700;color:#6B5A3E;cursor:pointer;font-family:inherit}
.chip.on.social{background:#E7F0FB;border-color:#2C6C9E;color:#1B4E77}
.chip.on.later{background:#FBF0E0;border-color:#C9A96E;color:#8A6A1E}
.toast{position:fixed;left:50%;bottom:72px;transform:translateX(-50%);background:#0A5230;color:#F4ECD6;font-size:12.5px;font-weight:700;padding:11px 20px;border-radius:24px;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.35);max-width:92vw;text-align:center;line-height:1.4}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top">
  <h1>PakPoshak — Hero Posters</h1>
  <div class="nav">
    <button onclick="go(-1)" title="Previous poster">&lsaquo;</button>
    <div class="counter" id="counter"></div>
    <button onclick="go(1)" title="Next poster">&rsaquo;</button>
  </div>
  <div class="spacer"></div>
  <select class="jump" id="jump" onchange="jumpPage(this.value)"></select>
  <div class="seg" id="langSeg">
    <button data-l="en" class="on">EN preview</button>
    <button data-l="bn">BN preview</button>
  </div>
  <button class="share-btn" onclick="shareLink()">📤 Share link</button>
  <button class="btn-copy" onclick="copyCode()">Copy code</button>
</div>

<div class="filters">
  <span class="flab">Show</span>
  <button class="fbtn on" id="fAll" onclick="setFilter('all')">All</button>
  <button class="fbtn" id="fSocial" onclick="setFilter('social')">📱 Social media</button>
  <button class="fbtn" id="fLater" onclick="setFilter('later')">🔖 Saved for later</button>
</div>

<div class="wrap">
  <div class="leftcol">
    <div class="pageband" id="pageband"></div>
    <div class="hero" id="hero"></div>
    <div class="posnav">
      <button class="arr" onclick="go(-1)">&lsaquo;</button>
      <div class="lab" id="posLab"></div>
      <button class="arr" onclick="go(1)">&rsaquo;</button>
    </div>
  </div>
  <div class="rightcol">
  <div class="panel">
    <div class="prow">
      <div class="grp">
        <label>Order on page</label>
        <div class="ord">
          <button id="upBtn" onclick="reorder(-1)" title="Move earlier">&uarr;</button>
          <button id="dnBtn" onclick="reorder(1)" title="Move later">&darr;</button>
        </div>
        <span style="font-size:12px;color:#6B5A3E" id="ordLab"></span>
      </div>
      <div class="grp" style="margin-left:auto">
        <label>Move / add to</label>
        <select id="moveSel" onchange="onMoveSel(this.value)"></select>
      </div>
    </div>

    <div class="chips">
      <button class="chip social" id="chSocial" onclick="toggleFlag('social')">📱 For social media</button>
      <button class="chip later" id="chLater" onclick="toggleFlag('later')">🔖 Save for later</button>
    </div>

    <div class="f2">
      <div class="fg"><label>EN Title</label><textarea id="f_en_t" rows="2" oninput="setField('en_t',this.value)"></textarea></div>
      <div class="fg"><label>BN Title</label><textarea id="f_bn_t" rows="2" class="bn" oninput="setField('bn_t',this.value)"></textarea></div>
      <div class="fg"><label>EN Subtitle</label><textarea id="f_en_s" rows="2" oninput="setField('en_s',this.value)"></textarea></div>
      <div class="fg"><label>BN Subtitle</label><textarea id="f_bn_s" rows="2" class="bn" oninput="setField('bn_s',this.value)"></textarea></div>
    </div>
    <div class="fg"><label>📝 Remarks (notes to Claude)</label><textarea id="f_remarks" rows="2" class="remarks" placeholder="e.g. 'move to home-w', 'new title: X', 'use a brighter photo'…" oninput="setField('remarks',this.value)"></textarea></div>

    <div class="actions">
      <button class="b-add" onclick="duplicateHere()">⧉ Duplicate this poster</button>
      <button class="b-del" onclick="delPoster()">✕ Delete this poster</button>
    </div>
  </div>
  </div>
</div>

<div class="out-wrap">
  <textarea id="out" readonly placeholder="Tap 'Copy code' — the complete PS_POSTERS block appears here and is copied to your clipboard."></textarea>
  <div class="out-note">Paste into <code>app.src.js</code> → replace the entire <code>const PS_POSTERS = {…};</code> block → run terser → bump PSB_BUILD + CACHE_VERSION → commit. Remarks become <code>// comments</code>.</div>
</div>

<div class="bar">
  <span class="info" id="barInfo"></span>
  <button class="cp" onclick="copyCode()">Copy code</button>
  <button class="rs" onclick="resetAll()">Reset to original</button>
</div>

/* ─── State ─── */
const LS_KEY = 'psb_posters_v3';
let pages = loadState();
let flat = 0;            // flat poster index across all pages
let plang = 'en';        // preview language
function loadState(){ try{var s=localStorage.getItem(LS_KEY); if(s) return JSON.parse(s);}catch(e){} return deep(ORIG); }
function saveState(){ try{localStorage.setItem(LS_KEY, JSON.stringify(pages));}catch(e){} }
function deep(o){ return JSON.parse(JSON.stringify(o)); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function metaOf(id){ return PAGE_META.find(function(m){return m.id===id;})||PAGE_META[0]; }

/* Flatten all posters (in PAGE_META order) → [{pid,i}] */
let filter='all';
function flatten(){ var out=[]; PAGE_META.forEach(function(m){ (pages[m.id]||[]).forEach(function(p,i){ if(filter==='all'||(filter==='social'&&p.social)||(filter==='later'&&p.later)) out.push({pid:m.id,i:i}); }); }); return out; }
function counts(){ var s=0,l=0,tt=0; PAGE_META.forEach(function(m){ (pages[m.id]||[]).forEach(function(p){ tt++; if(p.social)s++; if(p.later)l++; }); }); return {s:s,l:l,t:tt}; }
function setFilter(f){ filter=f; flat=0; render(); }
function toggleFlag(fl){ var ref=curRef(); if(!ref)return; var p=pages[ref.pid][ref.i]; p[fl]=!p[fl]; saveState(); render(); }
function totalCount(){ return flatten().length; }
function curRef(){ var f=flatten(); if(!f.length) return null; flat=Math.max(0,Math.min(flat,f.length-1)); return f[flat]; }

/* ─── Render ─── */
function render(){
  var f=flatten(), tot=f.length;
  var ref=curRef();
  var c=counts();
  document.getElementById('fSocial').innerHTML='📱 Social media <b>('+c.s+')</b>';
  document.getElementById('fLater').innerHTML='🔖 Saved for later <b>('+c.l+')</b>';
  ['fAll','fSocial','fLater'].forEach(function(id){ document.getElementById(id).classList.toggle('on', (id==='fAll'&&filter==='all')||(id==='fSocial'&&filter==='social')||(id==='fLater'&&filter==='later')); });
  document.getElementById('barInfo').textContent = c.t+' posters · '+c.s+' 📱 social · '+c.l+' 🔖 later';
  buildJump();
  if(!ref){
    document.getElementById('hero').innerHTML='<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#F1E8CF;font-size:1rem;text-align:center;padding:24px;line-height:1.6">Nothing tagged '+(filter==='social'?'📱 for social media':'🔖 for later')+' yet.<br>Switch to <b>All</b> and use the buttons under a poster to tag it.</div>';
    document.getElementById('counter').innerHTML='0 selected';
    document.getElementById('posLab').textContent='—';
    return;
  }
  var meta=metaOf(ref.pid), arr=pages[ref.pid], p=arr[ref.i];
  var onPage = arr.length, posOnPage = ref.i+1;

  // counter + labels
  document.getElementById('counter').innerHTML = 'Poster <b>'+(flat+1)+'</b> of '+tot;
  document.getElementById('posLab').innerHTML = meta.label+' &middot; poster '+posOnPage+' of '+onPage;
  document.getElementById('ordLab').textContent = posOnPage+' / '+onPage;
  document.getElementById('jump').value = ref.pid;

  // page band
  document.getElementById('pageband').innerHTML =
    '<span class="emoji">'+meta.emoji+'</span>'
    +'<span class="pt">'+meta.label+'</span>'
    +'<span class="rt">'+meta.route+'</span>'
    +'<span class="pd">'+meta.desc+'</span>';

  // hero preview
  renderHero(meta, p, arr, ref.i);

  // fields
  document.getElementById('f_en_t').value = p.en_t||'';
  document.getElementById('f_bn_t').value = p.bn_t||'';
  document.getElementById('f_en_s').value = p.en_s||'';
  document.getElementById('f_bn_s').value = p.bn_s||'';
  var rem=document.getElementById('f_remarks'); rem.value=p.remarks||''; rem.className='remarks'+(p.remarks?' has':'');
  document.getElementById('chSocial').className='chip social'+(p.social?' on':'');
  document.getElementById('chLater').className='chip later'+(p.later?' on':'');

  document.getElementById('upBtn').disabled = ref.i===0;
  document.getElementById('dnBtn').disabled = ref.i===onPage-1;

  // move / add-to options (pages + collections)
  var pageOpts = PAGE_META.filter(function(m){return m.id!==ref.pid;}).map(function(m){return '<option value="page:'+m.id+'">'+m.emoji+' '+m.label+'</option>';}).join('');
  document.getElementById('moveSel').innerHTML =
    '<option value="">Move / add to…</option>'
    +'<optgroup label="Move to another page (removes it from here)">'+pageOpts+'</optgroup>'
    +'<optgroup label="Add to collection (keeps it here)">'
      +'<option value="tag:social"'+(p.social?' disabled':'')+'>📱 Social media'+(p.social?'  ✓ added':'')+'</option>'
      +'<option value="tag:later"'+(p.later?' disabled':'')+'>🔖 Use later'+(p.later?'  ✓ added':'')+'</option>'
    +'</optgroup>';
}

function renderHero(meta, p, arr, idx){
  var img = PAGE_IMG[meta.id]||'';
  var t = plang==='bn' ? p.bn_t : p.en_t;
  var s = plang==='bn' ? p.bn_s : p.en_s;
  var bg = img ? 'style="background-image:url(\''+img+(img.indexOf('?')>-1?'&':'?')+'width=1000\')"' : 'style="background:linear-gradient(135deg,#0b3a22,#0a5230)"';
  var dots='';
  for(var d=0; d<arr.length; d++){ dots += '<span class="hdot'+(d===idx?' on':'')+'"></span>'; }
  document.getElementById('hero').innerHTML =
    '<div class="hero-img" '+bg+'></div>'
    +'<div class="hero-ov"></div>'
    +'<div class="hero-badge">'+meta.emoji+' '+meta.label+'</div>'
    +'<div class="hero-tx"><div class="hero-t">'+esc(t)+'</div><div class="hero-s">'+esc(s)+'</div></div>'
    +'<div class="hero-dots">'+dots+'</div>';
}

function buildJump(){
  var sel=document.getElementById('jump');
  if(sel.options.length) return; // build once
  sel.innerHTML = PAGE_META.map(function(m){ return '<option value="'+m.id+'">'+m.emoji+' '+m.label+' ('+(pages[m.id]||[]).length+')</option>'; }).join('');
}

/* ─── Nav ─── */
function go(d){ var tot=totalCount(); if(!tot)return; flat=(flat+d+tot)%tot; render(); }
function jumpPage(pid){ var f=flatten(); for(var k=0;k<f.length;k++){ if(f[k].pid===pid){ flat=k; break; } } render(); }

/* language toggle */
document.getElementById('langSeg').addEventListener('click',function(e){
  if(e.target.dataset.l){ plang=e.target.dataset.l;
    [].forEach.call(e.currentTarget.children,function(b){ b.classList.toggle('on', b.dataset.l===plang); });
    var ref=curRef(); if(ref) renderHero(metaOf(ref.pid), pages[ref.pid][ref.i], pages[ref.pid], ref.i);
  }
});

/* ─── Edit ─── */
function setField(field,val){
  var ref=curRef(); if(!ref)return;
  pages[ref.pid][ref.i][field]=val; saveState();
  if(field==='remarks'){ var r=document.getElementById('f_remarks'); r.className='remarks'+(val?' has':''); return; }
  // live update the hero for title/subtitle in the active language
  renderHero(metaOf(ref.pid), pages[ref.pid][ref.i], pages[ref.pid], ref.i);
}

function reorder(dir){
  var ref=curRef(); if(!ref)return; var arr=pages[ref.pid], i=ref.i, j=i+dir;
  if(j<0||j>=arr.length)return;
  var tmp=arr[i]; arr[i]=arr[j]; arr[j]=tmp; saveState();
  // follow the poster to its new flat index
  flat += dir; render();
}
function onMoveSel(v){
  if(!v) return;
  if(v.indexOf('page:')===0){ moveToPage(v.slice(5)); return; }
  if(v.indexOf('tag:')===0){
    var fl=v.slice(4), ref=curRef(); if(!ref)return;
    pages[ref.pid][ref.i][fl]=true; saveState(); render();
    toast(fl==='social'?'📱 Added to Social media — use the “Show” filter above to view the collection.':'🔖 Saved for later — use the “Show” filter above to view the collection.');
  }
}
function moveToPage(toPid){
  var ref=curRef(); if(!ref)return;
  var p=pages[ref.pid].splice(ref.i,1)[0];
  if(!pages[toPid]) pages[toPid]=[];
  p.remarks=(p.remarks?p.remarks+' | ':'')+'moved from '+ref.pid;
  pages[toPid].push(p); saveState();
  // jump to it at its new location
  var f=flatten(); for(var k=0;k<f.length;k++){ if(f[k].pid===toPid && pages[toPid][f[k].i]===p){ flat=k; break; } }
  render();
}
function duplicateHere(){
  filter='all';                                   // ensure the new poster is visible (not hidden by a filter)
  var ref=curRef();
  var src = ref ? pages[ref.pid][ref.i] : null;
  var pid = ref ? ref.pid : PAGE_META[0].id;
  var np = src
    ? { en_t:src.en_t, en_s:src.en_s, bn_t:src.bn_t, bn_s:src.bn_s, remarks:(src.remarks ? '(copy) '+src.remarks : '(copy)') }
    : { en_t:'', en_s:'', bn_t:'', bn_s:'', remarks:'NEW — fill in EN + BN text' };
  pages[pid].push(np); saveState();
  var f=flatten(); for(var k=f.length-1;k>=0;k--){ if(f[k].pid===pid){ flat=k; break; } }   // land on the new copy
  render();
  toast(src ? '⧉ Copied — a duplicate was added to “'+metaOf(pid).label+'”. Your original poster is untouched.' : '➕ New blank poster added to “'+metaOf(pid).label+'”.');
}
function delPoster(){
  var ref=curRef(); if(!ref)return; var arr=pages[ref.pid];
  var t=(arr[ref.i].en_t||'(blank)').slice(0,60);
  if(!confirm('Delete this poster from "'+metaOf(ref.pid).label+'"?\n\n"'+t+'"'))return;
  arr.splice(ref.i,1); saveState();
  if(flat>0) flat--; render();
}

/* ─── Code generation ─── */
function copyCode(){
  var out='// ── PASTE into app.src.js → replace the entire const PS_POSTERS = {…}; block ──\n';
  out+='const PS_POSTERS = {\n';
  PAGE_META.forEach(function(meta,pi){
    var arr=pages[meta.id]||[];
    out+='  \''+meta.id+'\': [\n';
    arr.forEach(function(p,i){
      if(p.remarks&&p.remarks.trim()) out+='    // '+p.remarks.trim()+'\n';
      out+='    { en_t:'+jsStr(p.en_t)+', en_s:'+jsStr(p.en_s)+', bn_t:'+jsStr(p.bn_t)+', bn_s:'+jsStr(p.bn_s)+' }';
      out+=i<arr.length-1?',\n':'\n';
    });
    out+='  ]'+(pi<PAGE_META.length-1?',':'')+'\n';
  });
  out+='};';
  var ta=document.getElementById('out'); ta.value=out;
  try{ ta.select(); document.execCommand('copy'); }catch(e){}
  try{ navigator.clipboard.writeText(out); }catch(e){}
  ta.scrollIntoView({behavior:'smooth',block:'center'});
  var btns=document.querySelectorAll('.btn-copy,.cp');
  btns.forEach(function(b){ var o=b.textContent; b.textContent='✅ Copied!'; setTimeout(function(){b.textContent=o;},1600); });
}
function jsStr(s){ return "'"+((s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"))+"'"; }
function resetAll(){
  if(!confirm('Reset ALL posters back to the original data? This clears your edits.'))return;
  pages=deep(ORIG); try{localStorage.removeItem(LS_KEY);}catch(e){} flat=0; render();
}

/* ─── Share / save-state (works on the live URL) ─── */
function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('show'); },3400); }
function copyText(s){ try{ navigator.clipboard.writeText(s); }catch(e){ var ta=document.createElement('textarea'); ta.value=s; document.body.appendChild(ta); ta.select(); try{ document.execCommand('copy'); }catch(_){} ta.remove(); } }
function b64u(bytes){ var s=''; for(var i=0;i<bytes.length;i++) s+=String.fromCharCode(bytes[i]); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
function unb64u(str){ str=str.replace(/-/g,'+').replace(/_/g,'/'); var bin=atob(str); var b=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b; }
async function gz(str){ var cs=new CompressionStream('gzip'); var w=cs.writable.getWriter(); w.write(new TextEncoder().encode(str)); w.close(); var buf=await new Response(cs.readable).arrayBuffer(); return b64u(new Uint8Array(buf)); }
async function gunz(s){ var ds=new DecompressionStream('gzip'); var w=ds.writable.getWriter(); w.write(unb64u(s)); w.close(); var buf=await new Response(ds.readable).arrayBuffer(); return new TextDecoder().decode(buf); }
async function shareLink(){
  var json=JSON.stringify({v:1,pages:pages});
  var payload;
  try{ payload='g'+await gz(json); }catch(e){ payload='b'+btoa(unescape(encodeURIComponent(json))); }
  var url=location.origin+location.pathname+'#s='+payload;
  copyText(url);
  toast('📤 Share link copied ('+(Math.round(url.length/102.4)/10)+' KB). Send it to anyone — they open it and see these exact posters + your 📱/🔖 tags.');
}
async function tryLoadHash(){
  var m=(location.hash||'').match(/#s=(.+)$/); if(!m) return;
  var payload=m[1], json=null;
  try{ json = payload.charAt(0)==='g' ? await gunz(payload.slice(1)) : decodeURIComponent(escape(atob(payload.slice(1)))); }catch(e){ console.warn('share link decode failed', e); }
  if(json){ try{ var obj=JSON.parse(json); if(obj&&obj.pages && confirm('This link contains a shared set of posters. Load it into this browser? (Replaces what is here now.)')){ pages=obj.pages; saveState(); } }catch(e){} }
  try{ history.replaceState(null,'',location.pathname); }catch(e){}
}

(async function(){ await tryLoadHash(); render(); })();
</script>
<div class="toast" id="toast"></div>
</body>
