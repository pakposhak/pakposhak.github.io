    .fgroup select.set{border-color:#0A5230;background:#F3F9EE}
    .fgroup .bn{font-size:12px;background:#F6F3EE}
    .bar{position:fixed;left:0;right:0;bottom:0;background:#0B261C;padding:10px 14px;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;box-shadow:0 -4px 16px rgba(0,0,0,.3);z-index:99}
    .bar button{font-family:inherit;font-size:13.5px;font-weight:700;border:none;border-radius:9px;padding:9px 18px;cursor:pointer}
    .btn-gold{background:#C9A96E;color:#1A1208}
    .btn-grn{background:#0A5230;color:#F4ECD6}
    .btn-ghost{background:transparent;color:#C9A96E;border:1.5px solid #6E5B33}

    .out{max-width:960px;margin:14px auto}

    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0A5230;color:#F4ECD6;font-size:13px;font-weight:700;padding:10px 22px;border-radius:30px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)}
    .toast.show{opacity:1}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function key(id){return 'pp3_'+id;}
function load(id){try{var v=localStorage.getItem(key(id));if(v)return JSON.parse(v);}catch(e){}return {};}
function save(id,obj){try{localStorage.setItem(key(id),JSON.stringify(obj));}catch(e){}updateCount();}

function defPage(p){
  if(p.defaultPage) return p.defaultPage;
  if(p.s==='Landing') return 'Home · All';
  if(p.s==='Luxury') return 'Luxe · All';
  if(p.s==='Brand') return 'Brand / Price-Check';
  if(p.s==='Filter') return 'Search (from Home)';
  var a=(p.a+' '+p.b+' '+(p.d[0]||'')).toLowerCase();
  if(a.indexOf('wedding')>=0) return 'Home · Women';
  if(a.indexOf('gen z')>=0) return 'Home · Women';
  if(a.indexOf('couple')>=0) return 'Home · All';
  if(a.indexOf('baby')>=0||a.indexOf('teen')>=0) return 'Home · Kids';
  if(a.indexOf('men')>=0||a.indexOf('kurta')>=0||a.indexOf('groom')>=0) return 'Home · Men';
  return 'Home · All';
}

function getState(id, p){
  var s=load(id);

    bnT: s.bnT||'',

}

    +'<rect width="840" height="400" fill="'+T.bg+'"/>'
    +'<rect x="470" width="370" height="400" fill="url(#g'+id+')"/>'
    +(photo?'<image href="'+photo+'" x="470" width="370" height="400" preserveAspectRatio="xMidYMin slice"/>':'')
    +'<rect x="330" width="300" height="400" fill="url(#f'+id+')"/>'
    +'<g transform="translate(46,40)">'
    +'<rect width="40" height="40" rx="11" fill="'+T.mk+'"/>'
    +'<polyline points="9,29 18,16 24,23 32,11" fill="none" stroke="'+T.ml+'" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>'
    +'<text x="52" y="19" font-family="Georgia,serif" font-size="23" font-weight="700" fill="'+T.br+'">PakPoshak</text>'
    +'<text x="52.5" y="35" font-family="Arial,sans-serif" font-size="10" letter-spacing="1.4" fill="'+T.tg+'">PAKISTANI FASHION · BD DELIVERY</text>'
    +'</g>'
    +'<text x="48" y="176" font-family="Georgia,serif" font-size="42" font-weight="700" fill="'+T.head+'">'+esc(a)+'</text>'
    +'<text x="48" y="222" font-family="Georgia,serif" font-size="42" font-weight="700" fill="'+T.acc+'">'+esc(b)+'</text>'
    +'<text x="48" y="264" font-family="Arial,sans-serif" font-size="16" fill="'+T.sub+'">'+esc(sub)+'</text>'
    +'<g transform="translate(48,292)">'
    +'<rect width="'+cw+'" height="46" rx="23" fill="'+T.cta+'"/>'
    +'<text x="'+(cw/2)+'" y="29" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="'+T.ctaT+'">'+esc(cta)+'  →</text>'
    +'</g>'
    +'</svg>';
}

function renderCard(p, idx){
  var id=p.id;
  var st=getState(id,p);
  var pageOpts=PAGES.map(function(pg){return '<option'+(pg===st.page?' selected':'')+'>'+esc(pg)+'</option>';}).join('');
  var isSet=st.page&&st.page!=='— unassigned —';
  var collTag=p.coll?'<span class="tag">'+esc(p.coll)+'</span>':'';
  var newTag=NEW_IDS.has(id)?'<span class="tag tag-new">NEW</span>':'';
  return '<div class="card" id="card_'+id+'">'
    +'<div class="card-num">'+String(idx+1).padStart(2,'0')+'</div>'
    +'<div class="card-svg" id="svg_'+id+'">'+svgFor(id,p,st)+'</div>'
    +'<div class="card-body">'
    +'<div class="card-head">'+esc(SEC[p.s]||p.s)+collTag+newTag+'</div>'
    +'<div class="frow">'
    +'<div class="fgroup"><label>EN line 1 (dark)</label><input value="'+esc(st.a)+'" data-id="'+id+'" data-f="a" oninput="onEdit(this)"/></div>'
    +'<div class="fgroup"><label>EN line 2 (accent colour)</label><input value="'+esc(st.b)+'" data-id="'+id+'" data-f="b" oninput="onEdit(this)"/></div>'
    +'</div>'
    +'<div class="frow">'
    +'<div class="fgroup"><label>EN sub-line</label><input value="'+esc(st.d0)+'" data-id="'+id+'" data-f="d0" oninput="onEdit(this)"/></div>'
    +'<div class="fgroup"><label>EN button</label><input value="'+esc(st.cta)+'" data-id="'+id+'" data-f="cta" oninput="onEdit(this)"/></div>'
    +'</div>'
    +'<div class="frow">'
    +'<div class="fgroup"><label>BN title (optional)</label><input class="bn" value="'+esc(st.bnT)+'" placeholder="বাংলা শিরোনাম..." data-id="'+id+'" data-f="bnT" oninput="onEdit(this)"/></div>'
    +'<div class="fgroup"><label>BN sub-line (optional)</label><input class="bn" value="'+esc(st.bnS)+'" placeholder="বাংলা সাব-লাইন..." data-id="'+id+'" data-f="bnS" oninput="onEdit(this)"/></div>'
    +'</div>'
    +'<div class="frow">'
    +'<div class="fgroup"><label>Show on page</label>'
    +'<select class="'+(isSet?'set':'')+'" data-id="'+id+'" onchange="onPage(this)">'+pageOpts+'</select>'
    +'</div>'
    +'<div class="fgroup"><label>Notes (optional)</label>'
    +'<input value="'+esc(st.notes)+'" placeholder="e.g. Eid only, swap photo…" data-id="'+id+'" data-f="notes" oninput="onEdit(this)"/>'
    +'</div>'
    +'</div>'
    +'</div>'
    +'</div>';
}

function render(){
  var html='',curSec='';
  P.forEach(function(p,i){
    if(p.s!==curSec){curSec=p.s;html+='<div class="secband">'+esc(SEC[p.s]||p.s)+' <span style="font-size:12px;font-weight:400;color:#7A6A4A">('+P.filter(function(x){return x.s===p.s;}).length+' posters)</span></div>';}
    html+=renderCard(p,i);
  });
  document.getElementById('rows').innerHTML=html;
  updateCount();
}

function onEdit(el){
  var id=el.dataset.id, f=el.dataset.f;
  var p=P.find(function(x){return x.id===id;});
  if(!p) return;
  var s=load(id); s[f]=el.value; save(id,s);
  // live SVG update (only for visible EN fields)
  if(['a','b','d0','cta'].indexOf(f)>=0){
    var st=getState(id,p);
    var el2=document.getElementById('svg_'+id);
    if(el2) el2.innerHTML=svgFor(id,p,st);
  }
}

function onPage(el){
  var id=el.dataset.id;
  var s=load(id); s.page=el.value; save(id,s);
  el.classList.toggle('set', el.value!=='— unassigned —');
}

function updateCount(){
  var n=0;
  P.forEach(function(p){
    var s=load(p.id);
    var pg=(s&&s.page!==undefined)?s.page:defPage(p);
    if(pg&&pg!=='— unassigned —') n++;
  });
  document.getElementById('count').textContent=n+' / '+P.length+' assigned';
}

function copyPlan(){
  var lines=['PakPoshak Poster Plan  ('+new Date().toLocaleDateString()+')',
             '='.repeat(50),''];
  var byPage={};
  P.forEach(function(p){
    var st=getState(p.id,p);
    var pg=st.page||defPage(p);
    (byPage[pg]=byPage[pg]||[]).push({p:p,st:st});
  });
  PAGES.forEach(function(pg){
    if(!byPage[pg]||pg==='— unassigned —') return;
    lines.push('');
    lines.push('== '+pg+' ==');
    byPage[pg].forEach(function(e){
      lines.push('  ['+e.p.id+'] '+e.st.a+' '+e.st.b);
      if(e.st.d0) lines.push('       Sub: '+e.st.d0);
      if(e.st.cta) lines.push('       CTA: '+e.st.cta+' →');
      if(e.st.bnT) lines.push('       BN:  '+e.st.bnT+(e.st.bnS?' / '+e.st.bnS:''));
      if(e.p.coll) lines.push('       Coll: '+e.p.coll);
      if(e.st.notes) lines.push('       Note: '+e.st.notes);
    });
  });
  var txt=lines.join('\n');
  var ta=document.getElementById('out');
  ta.value=txt;
  ta.scrollIntoView({behavior:'smooth',block:'center'});
  try{navigator.clipboard.writeText(txt);}catch(e){}
  try{ta.select();document.execCommand('copy');}catch(e){}
  showToast('Plan copied to clipboard.');
}

function shareLink(){
  var state={};
  P.forEach(function(p){
    var s=load(p.id);
    if(s&&Object.keys(s).length>0) state[p.id]=s;
  });
  try{
    var json=JSON.stringify(state);
    var enc=btoa(unescape(encodeURIComponent(json)));
    var url=location.origin+location.pathname+'#data='+enc;
    history.replaceState(null,'','#data='+enc);
    try{navigator.clipboard.writeText(url);}catch(e){}
    showToast('Share link copied — paste it anywhere to restore your plan.');
  }catch(e){showToast('Could not generate link.');}
}

function loadFromHash(){
  var h=location.hash;
  if(!h.startsWith('#data=')) return false;
  try{
    var raw=decodeURIComponent(escape(atob(h.slice(6))));
    var state=JSON.parse(raw);
    Object.keys(state).forEach(function(id){
      try{localStorage.setItem(key(id),JSON.stringify(state[id]));}catch(e){}
    });
    return true;
  }catch(e){return false;}
}

function resetAll(){
  if(!confirm('Clear ALL edits and page assignments? This cannot be undone.')) return;
  P.forEach(function(p){try{localStorage.removeItem(key(p.id));}catch(e){}});
  history.replaceState(null,'',location.pathname);
  document.getElementById('importBanner').innerHTML='';
  render();
  document.getElementById('out').value='';
  showToast('All edits cleared.');
}

var _toastT;
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(_toastT);
  _toastT=setTimeout(function(){t.classList.remove('show');},2800);
}

// Init
var imported=loadFromHash();
render();
if(imported){
  document.getElementById('importBanner').innerHTML=
    '<div class="import-banner">Shared plan imported — all edits and page assignments have been restored.</div>';
}
</script>
