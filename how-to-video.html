<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<title>Video Guide — PakPoshak</title>
<style>
  :root{
    --bg:#080E1C; --surface:#0F1929; --raised:#162035; --input-bg:#0A1320;
    --gold:#C9A96E; --gold-dim:rgba(201,169,110,0.14); --gold-bdr:rgba(201,169,110,0.4);
    --txt:#EEE4CE; --txt-sec:#A0B2C8; --txt-muted:#5A6E84; --bdr:#1E2D45; --green:#34d27b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    min-height:100vh;-webkit-tap-highlight-color:transparent}
  /* ── top bar ── */
  .top{position:sticky;top:0;z-index:5;background:rgba(8,14,28,.92);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:12px 16px}
  .top .brand{font-weight:800;color:var(--gold);font-size:0.98rem;letter-spacing:0.4px;flex:1}
  .lang-tg{display:flex;border:1px solid var(--gold-bdr);border-radius:16px;overflow:hidden}
  .lang-tg button{background:none;border:none;color:var(--txt-sec);font-weight:700;font-size:0.78rem;
    padding:5px 13px;cursor:pointer;font-family:inherit}
  .lang-tg button.on{background:var(--gold);color:#0A1628}
  .close-x{color:var(--txt-muted);text-decoration:none;font-size:1.35rem;line-height:1;padding:4px 8px}
  /* ── layout ── */
  .wrap{max-width:820px;margin:0 auto;padding:16px 16px 40px}
  .hint{background:var(--gold-dim);border:1px solid var(--gold-bdr);border-radius:12px;
    padding:10px 14px;font-size:0.86rem;color:var(--txt);margin-bottom:20px;line-height:1.45}
  .hint b{color:var(--gold)}
  .sec{margin-bottom:26px}
  .sec h3{font-size:0.82rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);
    margin-bottom:4px;font-weight:800}
  .sec .sub{font-size:0.82rem;color:var(--txt-muted);margin-bottom:14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
  /* ── card ── */
  .vcard{display:flex;flex-direction:column;text-align:left;background:var(--surface);
    border:1px solid var(--bdr);border-radius:14px;overflow:hidden;cursor:pointer;font-family:inherit;
    color:var(--txt);padding:0;transition:border-color .15s,transform .12s}
  .vcard:hover{border-color:var(--gold-bdr);transform:translateY(-2px)}
  .vcard.rec{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold-bdr)}
  .thumb{position:relative;height:230px;background-size:cover;background-position:top center;background-color:#000}
  .thumb .play{position:absolute;inset:0;margin:auto;width:52px;height:52px;display:flex;
    align-items:center;justify-content:center;background:rgba(201,169,110,.92);color:#0A1628;
    border-radius:50%;font-size:1.25rem;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .thumb .dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.72);color:#fff;
    font-size:0.72rem;font-weight:700;padding:2px 7px;border-radius:6px}
  .thumb .badge{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.62);color:var(--txt);
    font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:7px}
  .vcard.rec .thumb .badge{background:var(--gold);color:#0A1628}
  .vinfo{padding:11px 12px 13px}
  .vinfo .vttl{font-weight:700;font-size:0.92rem;display:block;line-height:1.3}
  /* ── modal player ── */
  .modal{position:fixed;inset:0;z-index:20;background:rgba(4,7,14,.94);display:none;
    align-items:center;justify-content:center;padding:16px;flex-direction:column}
  .modal.show{display:flex}
  .modal video{max-width:min(420px,92vw);max-height:80vh;width:auto;border-radius:14px;
    background:#000;box-shadow:0 18px 60px rgba(0,0,0,.7)}
  .modal .mttl{color:var(--txt);font-weight:700;font-size:0.95rem;margin-bottom:10px;text-align:center;max-width:92vw}
  .modal .mclose{position:absolute;top:14px;right:16px;color:var(--txt);background:var(--raised);
    border:1px solid var(--bdr);border-radius:50%;width:40px;height:40px;font-size:1.2rem;cursor:pointer;font-family:inherit}
  .modal .cc-note{color:var(--txt-muted);font-size:0.74rem;margin-top:10px}
  video::cue{background:rgba(0,0,0,.78);color:#fff;font-size:0.92em;line-height:1.35;font-family:inherit}
  .start-cta{display:block;text-align:center;background:var(--gold);color:#0A1628;font-weight:800;
    text-decoration:none;border-radius:22px;padding:13px;margin-top:8px;font-size:0.98rem}
</style>
</head>
<body>
  <div class="top">
    <span class="brand">🪡 PakPoshak — <span id="hd">Video Guide</span></span>
    <div class="lang-tg">
      <button id="lg-en" onclick="setL('en')">EN</button>
      <button id="lg-bn" onclick="setL('bn')">বাংলা</button>
    </div>
    <a class="close-x" href="./" title="Back to PakPoshak">✕</a>
  </div>

  <div class="wrap">
    <div class="hint" id="hint"></div>

    <div class="sec">
      <h3 id="h-start"></h3>
      <div class="sub" id="s-start"></div>
      <div class="grid" id="startGrid"></div>
    </div>

    <div class="sec">
      <h3 id="h-more"></h3>
      <div class="sub" id="s-more"></div>
      <div class="grid" id="moreGrid"></div>
    </div>

    <a class="start-cta" id="startCta" href="./"></a>
  </div>

  <div class="modal" id="modal">
    <button class="mclose" onclick="closeVideo()" aria-label="Close">✕</button>
    <div class="mttl" id="mttl"></div>
    <video id="player" controls playsinline preload="none"></video>
    <div class="cc-note" id="ccNote"></div>
  </div>

<script>
'use strict';
const MEDIA = 'media/guide/';
const VIDS = [
  {id:'intro-android',         grp:'start', dur:'0:41', dev:'android', badge:'🤖 Android'},
  {id:'install-iphone-chrome', grp:'start', dur:'0:17', dev:'ios',     badge:'🍎 iPhone · Chrome'},
  {id:'install-iphone-safari', grp:'start', dur:'0:17', dev:'ios',     badge:'🍎 iPhone · Safari'},
  {id:'order-browse-products', grp:'more',  dur:'0:07', badge:'🛍️ Browse Products'},
  {id:'order-browse-brands',   grp:'more',  dur:'1:00', badge:'🏷️ Browse Brands'},
  {id:'smart-search',          grp:'more',  dur:'1:22', badge:'🔎 Search'},
];
const T = {
  en:{
    hd:'Video Guide',
    h_start:'Start here · install the app', s_start:'A quick install so PakPoshak sits on your home screen like an app.',
    h_more:'Learn more · ordering & search', s_more:'Tap any guide to watch how it works.',
    cta:'Start My Order →',
    ccNote:'Captions: English — switch to বাংলা at the top.',
    hintIos:'Looks like you\'re on <b>iPhone</b> — start with the Safari or Chrome install guide below.',
    hintAndroid:'Looks like you\'re on <b>Android</b> — start with the Android guide below.',
    hintGeneric:'New here? Start with the <b>install</b> guide for your phone, then see how to order.',
    titles:{
      'intro-android':'Introduction (Android)',
      'install-iphone-chrome':'Install on iPhone — Chrome',
      'install-iphone-safari':'Install on iPhone — Safari',
      'order-browse-products':'Order via Browse Products',
      'order-browse-brands':'Full order via Browse Brands',
      'smart-search':'Smart Search made easy',
    }
  },
  bn:{
    hd:'ভিডিও গাইড',
    h_start:'শুরু করুন · অ্যাপ ইনস্টল', s_start:'অল্প সময়ে ইনস্টল করুন — PakPoshak হোম স্ক্রিনে app-এর মতো থাকবে।',
    h_more:'আরও জানুন · অর্ডার ও সার্চ', s_more:'কীভাবে কাজ করে দেখতে যেকোনো গাইডে ট্যাপ করুন।',
    cta:'অর্ডার শুরু করুন →',
    ccNote:'ক্যাপশন: বাংলা — উপরে থেকে English-এ পাল্টান।',
    hintIos:'আপনি সম্ভবত <b>iPhone</b> ব্যবহার করছেন — নিচের Safari বা Chrome ইনস্টল গাইড দিয়ে শুরু করুন।',
    hintAndroid:'আপনি সম্ভবত <b>Android</b> ব্যবহার করছেন — নিচের Android গাইড দিয়ে শুরু করুন।',
    hintGeneric:'নতুন? আপনার ফোনের <b>install</b> গাইড দিয়ে শুরু করুন, তারপর কীভাবে অর্ডার করবেন দেখুন।',
    titles:{
      'intro-android':'পরিচিতি (Android)',
      'install-iphone-chrome':'iPhone-এ ইনস্টল — Chrome',
      'install-iphone-safari':'iPhone-এ ইনস্টল — Safari',
      'order-browse-products':'Browse Products দিয়ে অর্ডার',
      'order-browse-brands':'Browse Brands দিয়ে সম্পূর্ণ অর্ডার',
      'smart-search':'স্মার্ট সার্চ — সহজে',
    }
  }
};
let L = (localStorage.getItem('psb_lang') === 'bn') ? 'bn' : 'en';
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform==='MacIntel' && navigator.maxTouchPoints>1);
const isAndroid = /Android/.test(navigator.userAgent);
const tt = k => T[L][k];

function card(v){
  const title = T[L].titles[v.id];
  const rec = (v.dev==='ios'&&isIOS) || (v.dev==='android'&&isAndroid);
  return `<button class="vcard${rec?' rec':''}" onclick="openVideo('${v.id}')">
    <div class="thumb" style="background-image:url('${MEDIA}${v.id}.jpg')">
      <span class="badge">${rec?'⭐ ':''}${v.badge}</span>
      <span class="play">▶</span>
      <span class="dur">${v.dur}</span>
    </div>
    <div class="vinfo"><span class="vttl">${title}</span></div>
  </button>`;
}
function render(){
  document.documentElement.lang = L;
  document.getElementById('hd').textContent = tt('hd');
  document.getElementById('h-start').textContent = tt('h_start');
  document.getElementById('s-start').textContent = tt('s_start');
  document.getElementById('h-more').textContent = tt('h_more');
  document.getElementById('s-more').textContent = tt('s_more');
  const cta = document.getElementById('startCta'); cta.textContent = tt('cta');
  document.getElementById('ccNote').textContent = tt('ccNote');
  document.getElementById('hint').innerHTML = isIOS?tt('hintIos'):isAndroid?tt('hintAndroid'):tt('hintGeneric');
  document.getElementById('startGrid').innerHTML = VIDS.filter(v=>v.grp==='start').map(card).join('');
  document.getElementById('moreGrid').innerHTML  = VIDS.filter(v=>v.grp==='more').map(card).join('');
  document.getElementById('lg-en').classList.toggle('on', L==='en');
  document.getElementById('lg-bn').classList.toggle('on', L==='bn');
  if(document.getElementById('modal').classList.contains('show') && currentId)
    document.getElementById('mttl').textContent = T[L].titles[currentId];
  applyCC();
}
let currentId = null;
const player = document.getElementById('player');
function openVideo(id){
  currentId = id;
  player.setAttribute('poster', MEDIA+id+'.jpg');
  player.innerHTML =
    `<source src="${MEDIA}${id}.mp4" type="video/mp4">`+
    `<track kind="captions" srclang="en" label="English" src="${MEDIA}${id}.en.vtt"${L==='en'?' default':''}>`+
    `<track kind="captions" srclang="bn" label="বাংলা" src="${MEDIA}${id}.bn.vtt"${L==='bn'?' default':''}>`;
  document.getElementById('mttl').textContent = T[L].titles[id];
  document.getElementById('modal').classList.add('show');
  player.load();
  player.play().catch(()=>{});
  setTimeout(applyCC, 250);
}
function closeVideo(){
  player.pause();
  document.getElementById('modal').classList.remove('show');
  player.removeAttribute('src'); player.innerHTML=''; player.load();
  currentId = null;
}
function applyCC(){
  const trk = player.textTracks; if(!trk) return;
  for(let i=0;i<trk.length;i++) trk[i].mode = (trk[i].language===L) ? 'showing' : 'disabled';
}
player.addEventListener('loadeddata', applyCC);
function setL(l){ L=l; localStorage.setItem('psb_lang', l); render(); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeVideo(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeVideo(); });
render();
</script>
</body>
</html>
