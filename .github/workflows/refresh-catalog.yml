name: Refresh product catalog

# Re-harvests catalog.json for the "Browse products" page and commits it.
# 4×/day at 10:00, 12:00, 17:00, 21:00 PKT (Pakistan, UTC+5).
# GitHub Actions cron is UTC, so: 05:00, 07:00, 12:00, 16:00 UTC.
on:
  schedule:
    - cron: '0 5,7,12,16 * * *'
  workflow_dispatch: {}        # lets you run it on demand from the Actions tab

permissions:
  contents: write              # allow the job to commit catalog.json

concurrency:
  group: refresh-catalog       # never overlap two refresh runs
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Harvest catalog
        run: node harvest-catalog.js

      - name: Sanity check (never publish a broken harvest or lose top brands)
        run: |
          node -e '
            const fs=require("fs"), cp=require("child_process");
            const cur=JSON.parse(fs.readFileSync("catalog.json","utf8"));
            const has=(j,b)=>j.products.some(p=>p.b===b);
            let prev=null; try{ prev=JSON.parse(cp.execSync("git show HEAD:catalog.json").toString()); }catch(e){}
            const bad=[];
            if((cur.count||0)<800) bad.push("count "+cur.count+" < 800");
            if(prev){ for(const b of ["Khaadi","Sapphire"]) if(has(prev,b) && !has(cur,b)) bad.push("lost "+b); }
            if(bad.length){ console.log("::warning::Bad harvest ("+bad.join(", ")+") — keeping the previous catalog."); cp.execSync("git checkout -- catalog.json"); }
            else console.log("OK: "+cur.count+" products from "+cur.brands+" brands");
          '

      - name: Commit & push if changed
        run: |
          git config user.name "pakiposhak-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --cached --quiet; then
            echo "No catalog change — nothing to commit."
            exit 0
          fi
          COUNT=$(node -e "console.log(require('./catalog.json').count||0)")
          git commit -m "Auto-refresh catalog: ${COUNT} products [skip ci]"
          git pull --rebase origin main
          git push
