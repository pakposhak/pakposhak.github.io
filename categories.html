<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta name="google" content="notranslate"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Categories – PakPoshak</title>
  <link rel="icon" type="image/png" sizes="192x192" href="pakposhak-icon-192.png"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <style>
    :root {
      --gold: #B8860B;
      --gold-light: #F5E6C0;
      --bg: #FDFAF5;
      --surface: #FFFFFF;
      --surface2: #F7F3EC;
      --border: #E8E0D0;
      --text: #1A1208;
      --text2: #6B5A3E;
      --text3: #9E8B6E;
      --radius: 8px;
    }
    [data-theme="dark"] {
      --bg: #141008;
      --surface: #1E180C;
      --surface2: #271F10;
      --border: #3A2F1C;
      --text: #F5E6C0;
      --text2: #C4A96E;
      --text3: #8A7550;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    body { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ── */
    .cat-header {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; padding-top: calc(12px + env(safe-area-inset-top));
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; position: sticky; top: 0; z-index: 10;
    }
    .cat-header a { color: var(--text2); text-decoration: none; font-size: 20px; line-height: 1; }
    .cat-header h1 { font-size: 16px; font-weight: 600; flex: 1; color: var(--text); }
    .cat-header .hdr-icons { display: flex; gap: 16px; }
    .cat-header .hdr-icons a { font-size: 20px; }

    /* ── Body: rail + panel ── */
    .cat-body { display: flex; flex: 1; min-height: 0; }

    /* ── Left rail ── */
    .cat-rail {
      width: 88px; flex-shrink: 0;
      background: var(--surface2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
      padding: 6px 0;
    }
    .rail-item {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      padding: 12px 6px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.15s;
    }
    .rail-item.active {
      background: var(--surface);
      border-left-color: var(--gold);
    }
    /* Refined department icons: a soft tinted disc + a thin custom line-icon (no emoji),
       Ivory & Gold friendly; the active item lifts and gains a gold ring. */
    .rail-icon {
      width: 54px; height: 54px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 1.5px solid var(--border); overflow: hidden;
      box-shadow: 0 2px 6px -3px rgba(120,90,20,.28);
      transition: border-color .15s, box-shadow .15s, transform .14s;
    }
    .rail-icon svg { width: 30px; height: 30px; }
    .rail-item.active .rail-icon {
      border-color: var(--gold);
      box-shadow: 0 4px 11px -3px rgba(184,134,11,.5);
      transform: translateY(-1px);
    }
    .rail-item:active .rail-icon { transform: scale(.94); }
    .ri-w { background: linear-gradient(150deg,#FBEEF3,#F3DCE7); color:#A53E63; }
    .ri-m { background: linear-gradient(150deg,#EAF1F8,#D7E4F2); color:#2C5C84; }
    .ri-k { background: linear-gradient(150deg,#EBF5ED,#D7ECDC); color:#2C7B47; }
    .ri-b { background: linear-gradient(150deg,#F2ECFB,#E4DAF5); color:#5A4A9C; }
    [data-theme="dark"] .ri-w { background:#3A2430; color:#E89DB9; }
    [data-theme="dark"] .ri-m { background:#1F2C3A; color:#8FBEE6; }
    [data-theme="dark"] .ri-k { background:#1E3326; color:#86CF9B; }
    [data-theme="dark"] .ri-b { background:#2A2440; color:#B9A9F0; }
    .rail-label {
      font-size: 10.5px; color: var(--text3); text-align: center;
      line-height: 1.3; font-weight: 500;
    }
    .rail-item.active .rail-label { color: var(--gold); }
    .rail-divider { height: 1px; background: var(--border); margin: 4px 12px; }

    /* ── Right panel ── */
    .cat-panel { flex: 1; overflow-y: auto; padding-bottom: calc(24px + 68px + env(safe-area-inset-bottom)); }

    /* Category chips */
    .sec-title {
      font-size: 13px; font-weight: 600; color: var(--text);
      padding: 14px 14px 6px; letter-spacing: 0.01em;
    }
    .sec-divider { height: 1px; background: var(--border); margin: 0 14px 10px; }
    .sub-heading {
      font-size: 10px; font-weight: 600; color: var(--text3);
      padding: 0 14px 6px; text-transform: uppercase; letter-spacing: 0.07em;
    }
    /* Square product-image tiles (Myntra-style) — 2 per row, like the brand grid */
    .chip-row {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px; padding: 0 12px 14px;
    }
    .chip {
      position: relative; display: flex; flex-direction: column; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
      transition: transform 0.12s, border-color 0.12s;
    }
    .chip:active { transform: scale(0.97); border-color: var(--gold); }
    /* Picked state — multi-select before Apply (a category no longer navigates on tap). */
    .chip.picked { border-color: var(--gold); border-width: 2px; }
    .chip-check {
      display: none; position: absolute; top: 6px; right: 6px; z-index: 2;
      width: 22px; height: 22px; border-radius: 50%; background: var(--gold); color: #fff;
      align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
      box-shadow: 0 2px 6px -1px rgba(0,0,0,.3);
    }
    .chip.picked .chip-check { display: flex; }
    /* Floating "Apply" bar — hidden until at least one chip is picked. */
    .apply-bar {
      position: fixed; left: 16px; right: 16px; bottom: calc(16px + env(safe-area-inset-bottom));
      z-index: 20; padding: 14px; border: none; border-radius: 14px;
      background: var(--gold); color: #fff; font-size: 15px; font-weight: 700;
      font-family: inherit; cursor: pointer; box-shadow: 0 6px 20px -4px rgba(184,134,11,.5);
    }
    .apply-bar[hidden] { display: none; }
    .apply-bar:active { opacity: 0.88; }
    /* Square image box: shows a coloured initials fallback, with the real product
       photo layered on top once it loads. */
    .chip-imgbox {
      position: relative; width: 100%; aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; text-align: center;
      line-height: 1.25; padding: 8px; overflow: hidden;
    }
    .chip-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center top; display: block;
      opacity: 0; transition: opacity 0.25s ease;
    }
    .chip-imgbox.has-img .chip-img { opacity: 1; }
    .chip-label {
      font-size: 11.5px; font-weight: 600; color: var(--text);
      text-align: center; line-height: 1.3; padding: 8px 6px 10px;
    }
    /* Colour themes per section (fallback tint when no product image) */
    .c-eastern  { background: #FDF0DC; color: #7A4800; }
    .c-western  { background: #E4EEF9; color: #1A4B82; }
    .c-festive  { background: #FAE8F0; color: #7A2040; }
    .c-access   { background: #E8F5EC; color: #1A5C30; }

    /* ── Brand grid ── */
    .brand-search-wrap { padding: 10px 12px 4px; }
    .brand-search {
      width: 100%; padding: 9px 14px; font-size: 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; color: var(--text); outline: none;
    }
    .brand-search:focus { border-color: var(--gold); }
    .gender-seg {
      display: flex; margin: 8px 12px 10px;
      border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .gseg-btn {
      flex: 1; text-align: center; padding: 7px 4px;
      font-size: 12px; font-weight: 600; color: var(--text2);
      background: var(--surface2); cursor: pointer; border: none;
      transition: background 0.15s, color 0.15s;
    }
    .gseg-btn:not(:last-child) { border-right: 1px solid var(--border); }
    .gseg-btn.on { background: var(--gold); color: #fff; }
    .brand-grid {
      display: grid; grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px; padding: 0 12px 16px;
    }
    .brand-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; display: flex; flex-direction: column;
      align-items: center; gap: 7px; padding: 14px 8px 12px;
      cursor: pointer; text-decoration: none; color: inherit;
      transition: border-color 0.15s, transform 0.12s;
    }
    .brand-card:active { transform: scale(0.96); border-color: var(--gold); }
    .brand-logo {
      width: 68px; height: 68px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; text-align: center;
      line-height: 1.3; color: #fff; overflow: hidden; flex-shrink: 0;
    }
    .brand-logo img {
      width: 100%; height: 100%; object-fit: contain;
      background: var(--surface);
    }
    .brand-card-name {
      font-size: 11.5px; font-weight: 600; color: var(--text);
      text-align: center; line-height: 1.3;
    }
    .brand-card-dept {
      font-size: 10px; color: var(--text3); text-align: center;
      line-height: 1.3;
    }
    .brand-empty {
      grid-column: 1/-1; text-align: center;
      color: var(--text3); font-size: 13px; padding: 32px 0;
    }
  </style>
</head>

  {n:'Zaha by Elan',   u:'zaha.pk',                 c:'p', g:['w']},
  {n:'Zainab Chottani',u:'pk.zainabchottani.com',   c:'p', g:['w']},
  {n:'Afrozeh',        u:'afrozeh.com',             c:'p', g:['w']},
  {n:'Faiza Saqlain',  u:'faizasaqlain.pk',         c:'p', g:['w']},
  {n:'Imrozia Premium',u:'imroziapremium.com',      c:'p', g:['w']},
  {n:'Nomi Ansari',    u:'nomiansari.com.pk',       c:'p', g:['w']},
  {n:'Zara Shahjahan', u:'zarashahjahan.com',       c:'p', g:['w']},
  // Men
  {n:'Amir Adnan',     u:'amiradnan.com',           c:'m', g:['m']},
  {n:'Cambridge',      u:'thecambridgeshop.com',    c:'m', g:['m']},
  {n:'Charcoal',       u:'charcoal.com.pk',         c:'m', g:['m']},
  {n:'Cougar',         u:'cougar.com.pk',           c:'m', g:['m']},
  {n:'Deepak Perwani', u:'deepakperwani.com',       c:'m', g:['m']},
  {n:'Monark',         u:'monark.com.pk',           c:'m', g:['m']},
  {n:'Royal Tag',      u:'royaltag.com.pk',         c:'m', g:['m']},
  {n:'Shahzeb Saeed',  u:'shahzebsaeed.com',        c:'m', g:['m']},
  {n:'Furor',          u:'furorjeans.com',          c:'m', g:['m']},
  {n:'Dynasty Fabrics',u:'dynastyfabrics.com',      c:'m', g:['m']},
  // Kids
  {n:'Minnie Minors',  u:'minnieminors.com',        c:'k', g:['k']},
  {n:'Pepperland',     u:'pepperland.pk',           c:'k', g:['k']},
  {n:'Bachaa Party',   u:'bachaaparty.com',         c:'k', g:['k']},
  {n:'Hopscotch',      u:'ilovehopscotch.com',      c:'k', g:['k']},
];

// Remove any accidental duplicates by name
const _seen = new Set();
const BRANDS_DEDUPED = BRANDS.filter(b => { if(_seen.has(b.n)) return false; _seen.add(b.n); return true; });

// Brands most sought-after in Bangladesh lead every view (multi-department giants
// first so they also top the Men/Kids filters, then the BD-favourite designers).
// Stable sort: brands not on this list keep their original order after the famous ones.
const BD_FAMOUS = [
  'Khaadi','Sana Safinaz','Maria B','Gul Ahmed','Sapphire','ETHNC','Asim Jofa','Bareeze',
  'Alkaram Studio','Limelight','Bonanza Satrangi','J. Junaid Jamshed','Nishat Linen',
  'Edenrobe','Outfitters','Elan','Zara Shahjahan','Beechtree','Generation',
  'Cross Stitch','Charizma','Baroque','Sania Maskatiya','Mushq','Afrozeh','Maryum N Maria',
];
const _fameRank = n => { const i = BD_FAMOUS.indexOf(n); return i === -1 ? 999 : i; };
const BRANDS_SORTED = BRANDS_DEDUPED
  .map((b, i) => ({ b, i }))
  .sort((x, y) => (_fameRank(x.b.n) - _fameRank(y.b.n)) || (x.i - y.i))
  .map(o => o.b);

// ── Logo colour fallbacks ─────────────────────────────────────────────────────
const LOGO_COLORS = [
  '#534AB7','#0F6E56','#993C1D','#185FA5','#854F0B',
  '#993556','#3B6D11','#633806','#0C447C','#72243E',
  '#27500A','#A32D2D','#2C5A6E','#6E2C52','#1A5E1A',
];
function brandColor(idx){ return LOGO_COLORS[idx % LOGO_COLORS.length]; }
function initials(name){ return name.split(/[\s\-\.&\/]+/).map(w=>w[0]||'').join('').slice(0,2).toUpperCase() || '?'; }

// ── State ─────────────────────────────────────────────────────────────────────
let activeTab = 'w';
let brandGender = 'all';
let brandQuery  = '';
// Multi-select for category chips (brand cards stay single-tap → straight to that brand's
// page, unchanged). Picks reset on every tab switch — cross-department combos aren't
// supported, so Apply always sends categories from ONE department at a time.
let pickedCats = new Set();

// ── Product-image thumbnails for category tiles ───────────────────────────────
// Each category tile shows a real product photo, fetched once from the VPS search
// API (?cat=<key>) and cached in localStorage so repeat visits are instant.
const SEARCH_BASE = 'https://103.83.91.34.sslip.io/search';
// Curated MODEL photos that override the live "first product" guess for tiles the
// auto-pick gets wrong (saree-looking unstitched, odd maxi, flat-lay western top).
const CAT_IMG_OVERRIDE = {
  lawn_3pc_unstitch: 'https://cdn.shopify.com/s/files/1/2044/1461/files/052A3725.jpg?v=1782200510',
  maxi_dress: 'https://cdn.shopify.com/s/files/1/0581/7234/2437/files/DSC06392.jpg?v=1770377155',
  western_top: 'https://pk.sapphireonline.pk/dw/image/v2/BKSB_PRD/on/demandware.static/-/Sites-sapphire-master-catalog/default/dw55e0ccc5/images/June26/10thJune26/WTOP26V50018_999_2.jpg?sw=500'
};
const THUMB_CACHE_KEY = 'psb_cat_thumbs_v2';
let thumbCache = {};
try { thumbCache = JSON.parse(localStorage.getItem(THUMB_CACHE_KEY) || '{}'); } catch(e) {}
let _thumbSaveT = null;
function saveThumbCache() {
  clearTimeout(_thumbSaveT);
  _thumbSaveT = setTimeout(() => { try { localStorage.setItem(THUMB_CACHE_KEY, JSON.stringify(thumbCache)); } catch(e) {} }, 400);
}
// Ask Shopify's CDN for a small, square-friendly render so tiles load fast.
function thumbUrl(u) {
  try {
    const url = new URL(u);
    if (/shopify|cdn/i.test(url.hostname) && !url.searchParams.has('width')) url.searchParams.set('width', '400');
    return url.toString();
  } catch(e) { return u; }
}
function applyThumb(box, url) {
  const img = new Image();
  img.className = 'chip-img';
  img.alt = '';
  img.onload = () => { box.appendChild(img); box.classList.add('has-img'); };
  img.src = thumbUrl(url);
}
function fetchCatThumb(key, box) {
  if (!key || box.dataset.loaded) return;
  box.dataset.loaded = '1';
  if (CAT_IMG_OVERRIDE[key]) { applyThumb(box, CAT_IMG_OVERRIDE[key]); return; }
  if (thumbCache[key]) { applyThumb(box, thumbCache[key]); return; }
  fetch(SEARCH_BASE + '?cat=' + encodeURIComponent(key) + '&pageSize=1&page=0', { cache: 'default' })
    .then(r => r.ok ? r.json() : null)
    .then(j => {
      const url = j && j.products && j.products[0] && j.products[0].img;
      if (url) { thumbCache[key] = url; saveThumbCache(); applyThumb(box, url); }
    }).catch(() => {});
}
function loadCatThumbs() {
  // Cached categories paint instantly; uncached ones fetch now (browser caps
  // concurrency at ~6/host). Every result is cached so repeat visits are instant.
  document.querySelectorAll('.chip-imgbox[data-cat]').forEach(box => {
    if (box.dataset.loaded) return;
    fetchCatThumb(box.getAttribute('data-cat'), box);
  });
}

// ── Render helpers ────────────────────────────────────────────────────────────
function renderCats(g) {
  const sections = CAT_DATA[g];
  let html = '';
  sections.forEach(sec => {
    html += `<div class="sec-title">${esc(sec.sec)}</div><div class="sec-divider"></div>`;
    sec.groups.forEach(grp => {
      if (grp.sub) html += `<div class="sub-heading">${esc(grp.sub)}</div>`;
      html += `<div class="chip-row">`;
      grp.items.forEach(([key, label]) => {
        const ini = label.split(/[\s\/\-–\(]+/).map(w=>w[0]||'').filter(Boolean).join('').slice(0,3).toUpperCase();
        const on = pickedCats.has(key);
        html += `<div class="chip${on?' picked':''}" data-key="${esc(key)}" onclick="toggleCatPick('${key}',this)" role="button" tabindex="0" aria-pressed="${on?'true':'false'}">
          <div class="chip-imgbox ${sec.cls}" data-cat="${esc(key)}">${esc(ini)}</div>
          <span class="chip-label">${esc(label)}</span>
          <span class="chip-check" aria-hidden="true">&#10003;</span>
        </div>`;
      });
      html += `</div>`;
    });
  });
  document.getElementById('catPanel').innerHTML = html;
  loadCatThumbs();
}

// Harvested brand logos (better quality than favicons); keyed by hostname (no www).
let BRAND_LOGOS = {};
try { BRAND_LOGOS = JSON.parse(localStorage.getItem('psb_brand_logos') || '{}') || {}; } catch(e){}
fetch('brand-logos.json', { cache:'default' }).then(r => r.ok ? r.json() : null)
  .then(j => { if (j && typeof j==='object') { BRAND_LOGOS = j; try{ localStorage.setItem('psb_brand_logos', JSON.stringify(j)); }catch(e){} if (activeTab === 'brands') renderBrands(); } }).catch(()=>{});
function brandLogo(u){ const h = String(u||'').replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0]; return BRAND_LOGOS[h] || ''; }

function renderBrands() {
  const q = brandQuery.toLowerCase().trim();
  const filtered = BRANDS_SORTED.filter(b => {
    const gMatch = brandGender === 'all' || b.g.includes(brandGender);
    const qMatch = !q || b.n.toLowerCase().includes(q);
    return gMatch && qMatch;
  });

  const seg = [['all','All'],['w','Women'],['m','Men'],['k','Kids']].map(([v,l]) =>
    `<button type="button" class="gseg-btn${v===brandGender?' on':''}" onclick="setBrandGender('${v}')">${l}</button>`
  ).join('');

  let cards = '';
  if (!filtered.length) {
    cards = `<div class="brand-empty">No brands found</div>`;
  } else {
    filtered.forEach((b, i) => {
      const col = brandColor(i);
      const ini = initials(b.n);
      // Harvested brand logo (sharp); fall back to Google favicon if we don't have one.
      const logoUrl = brandLogo(b.u) || `https://www.google.com/s2/favicons?domain=${encodeURIComponent(b.u)}&sz=128`;
      cards += `<a class="brand-card" href="index.html?brand=${encodeURIComponent(b.n)}" aria-label="${esc(b.n)}">
        <div class="brand-logo" style="background:${col};" data-domain="${esc(b.u)}">
          <img src="${esc(logoUrl)}" alt="${esc(b.n)}" loading="lazy"
               onload="this.parentElement.style.background='var(--surface)'"
               onerror="this.remove()"/>
        </div>
        <span class="brand-card-name">${esc(b.n)}</span>
        <span class="brand-card-dept">${esc(deptLabel(b))}</span>
      </a>`;
    });
  }

  document.getElementById('catPanel').innerHTML = `
    <div class="sec-title">Browse Brands</div>
    <div class="sec-divider"></div>
    <div class="brand-search-wrap">
      <input class="brand-search" type="search" placeholder="Search 150+ brands…"
             value="${esc(brandQuery)}"
             oninput="brandQuery=this.value;renderBrands()"
             autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>
    <div class="gender-seg">${seg}</div>
    <div class="brand-grid" id="brandGrid">${cards}</div>
  `;
}

function deptLabel(b) {
  if (b.c === 'md') return 'Women · Men · Kids';
  if (b.c === 'p')  return 'Premium — Women';
  if (b.c === 'w')  return "Women's wear";
  if (b.c === 'm')  return "Men's wear";
  if (b.c === 'k')  return "Kids' wear";
  return '';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function switchTab(g, el) {
  document.querySelectorAll('.rail-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  activeTab = g;
  pickedCats = new Set();   // switching departments resets the pick — no cross-department Apply
  updateApplyBar();
  if (g === 'brands') renderBrands();
  else renderCats(g);
}

function setBrandGender(v) {
  brandGender = v;
  renderBrands();
}

// Tap a category chip → toggle it picked (no navigation yet). Multiple chips can be picked
// before tapping Apply, which sends them all together.
function toggleCatPick(catKey, el) {
  if (pickedCats.has(catKey)) pickedCats.delete(catKey); else pickedCats.add(catKey);
  const on = pickedCats.has(catKey);
  el.classList.toggle('picked', on);
  el.setAttribute('aria-pressed', on ? 'true' : 'false');
  updateApplyBar();
}

// Show/hide the floating Apply bar and keep its count current.
function updateApplyBar() {
  const bar = document.getElementById('applyBar');
  if (!bar) return;
  const n = pickedCats.size;
  bar.hidden = n === 0;
  const cnt = document.getElementById('applyCount');
  if (cnt) cnt.textContent = n ? ' (' + n + ')' : '';
}

// Apply → go to Browse Products with every picked category applied together.
function applyCats() {
  if (!pickedCats.size) return;
  window.location.href = 'index.html?fromcat=' + [...pickedCats].map(encodeURIComponent).join(',');
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderCats('w');
</script>
